name: Build and Test

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64]
        config: [Debug, Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          choco install cmake ninja -y

      - name: Configure CMake
        shell: pwsh
        run: |
          $arch = if ("${{ matrix.arch }}" -eq "x86") { "Win32" } else { "x64" }

          cmake -B build `
            -G "Visual Studio 17 2022" `
            -A $arch

      - name: Build
        run: |
          cmake --build build --config ${{ matrix.config }}

      - name: Test
        run: |
          ctest --test-dir build -C ${{ matrix.config }} --output-on-failure
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}-${{ matrix.config }}
          path: build/
          retention-days: 5

  code-analysis:
    name: Code Analysis
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        shell: pwsh
        run: |
          choco install cmake cppcheck -y

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" `
            -A x64

      - name: Run cppcheck
        shell: pwsh
        run: |
          cppcheck `
            --enable=all `
            --inconclusive `
            --suppress=missingIncludeSystem `
            --error-exitcode=1 `
            src/
        continue-on-error: true

  check-format:
    name: Code Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find . \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" \) | while read file; do
            echo "Checking $file"
            clang-format --dry-run --Werror "$file" || exit 1
          done
